# emretopcu.ai — haftalık tazelik: en yeni YouTube videosunu çeker, değiştiyse
# yeniden derleyip Cloudflare Pages'e deploy eder ve son-video.json'u commit'ler.
# Kamp/egitimtakvimi ile ilgisi yok; yalnız emretopcu-com klasörünü etkiler.
name: emretopcu haftalık tazelik

on:
  schedule:
    - cron: "0 6 * * 1" # her Pazartesi 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tazele:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emretopcu-com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: En yeni videoyu çek
        run: node scripts/son-video.mjs
      - name: Değişiklik var mı
        id: fark
        run: |
          if git diff --quiet public/son-video.json; then
            echo "degisti=false" >> "$GITHUB_OUTPUT"
          else
            echo "degisti=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Derle ve deploy et
        if: steps.fark.outputs.degisti == 'true' && env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm run build
          npx wrangler pages deploy out --project-name=emretopcu-ai --branch=main
      - name: son-video.json'u commit'le
        if: steps.fark.outputs.degisti == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/son-video.json
          git commit -m "emretopcu.ai: en yeni video güncellendi"
          git push
