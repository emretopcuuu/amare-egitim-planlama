<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nisan 2026 Eğitim Takvimi ve Planlama Altyapısı" />
    <title>One Team Eğitim Yönetim Sistemi</title>
    <meta property="og:title" content="One Team Eğitim Yönetim Sistemi" />
    <meta property="og:description" content="Nisan 2026 Eğitim Takvimi ve Planlama Altyapısı" />
    <meta property="og:site_name" content="One Team Eğitim Yönetim Sistemi" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://egitimtakvimi.oneteamglobal.ai" />
    <meta property="og:image" content="https://egitimtakvimi.oneteamglobal.ai/logos/oneteam%20logo.JPG" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1080" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Stale bundle koruması: 5dk'da bir HEAD request ile ana HTML değiştiyse otomatik reload
      // Ayrıca: build hash'i localStorage'da tut, mismatch varsa zorla refresh
      (function() {
        const KEY = 'app_build_hash';
        function getCurrentBundleHash() {
          const s = document.querySelector('script[src*="/assets/index-"]');
          if (!s) return null;
          const m = s.src.match(/index-([A-Za-z0-9]+)\./);
          return m ? m[1] : null;
        }
        // İlk yüklemede: localStorage'a hash yaz
        window.addEventListener('load', function() {
          const h = getCurrentBundleHash();
          if (h) localStorage.setItem(KEY, h);
        });
        // 3 dakikada bir tekrar fetch HTML, hash farklıysa reload
        setInterval(async function() {
          try {
            const r = await fetch(location.origin + '/?_=' + Date.now(), { cache: 'no-store' });
            const html = await r.text();
            const m = html.match(/index-([A-Za-z0-9]+)\.js/);
            if (!m) return;
            const liveHash = m[1];
            const curHash = getCurrentBundleHash();
            if (curHash && liveHash && curHash !== liveHash) {
              console.log('[stale-bundle] eski:', curHash, 'yeni:', liveHash, '— reload');
              location.reload();
            }
          } catch (e) {}
        }, 180000); // 3dk
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
