<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Premium typography — Inter (sans) + Space Grotesk (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <!-- Firestore + Firebase Auth — paralel olarak preconnect ile DNS/TLS handshake önden başlar -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />
    <!-- Logo image preload — ilk paint'te görünür -->
    <link rel="preload" as="image" href="/logos/oneteam%20logo.JPG" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6B46C1" />
    <link rel="apple-touch-icon" href="/logos/oneteam logo.JPG" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="OT Takvim" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Nisan 2026 Eğitim Takvimi ve Planlama Altyapısı" />
    <title>One Team Eğitim Yönetim Sistemi</title>
    <meta property="og:title" content="One Team Eğitim Yönetim Sistemi" />
    <meta property="og:description" content="Nisan 2026 Eğitim Takvimi ve Planlama Altyapısı" />
    <meta property="og:site_name" content="One Team Eğitim Yönetim Sistemi" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://egitimtakvimi.oneteamglobal.ai" />
    <meta property="og:image" content="https://egitimtakvimi.oneteamglobal.ai/logos/oneteam%20logo.JPG" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1080" />
    <!-- 13 May 2026: Visit tracking beacon — monitor.oneteamglobal.ai anasayfada gozukur. -->
    <script>
      (function () {
        try {
          var body = JSON.stringify({
            site: 'egitimtakvimi',
            path: location.pathname || '/',
            referrer: document.referrer || null
          });
          fetch('https://monitor.oneteamglobal.ai/.netlify/functions/track-visit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: body,
            keepalive: true
          }).catch(function () { /* sessizce gec */ });
        } catch (e) { /* sessizce gec */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Stale bundle koruması — iOS Safari & WhatsApp in-app browser cache sorunu
      // 1. Sayfa açılır açılmaz hash kontrolü — eski ise ANINDA reload
      // 2. Sonra 3dk'da bir periyodik kontrol
      (function() {
        var RELOAD_FLAG = 'sb_reloaded_' + Date.now().toString().slice(0, -5); // 10sn loop koruması
        function getCurrentBundleHash() {
          var s = document.querySelector('script[src*="/assets/index-"]');
          if (!s) return null;
          var m = s.src.match(/index-([A-Za-z0-9_-]+)\./);
          return m ? m[1] : null;
        }
        async function checkStale(immediate) {
          try {
            var r = await fetch(location.origin + '/?_sb=' + Date.now(), { cache: 'no-store' });
            var html = await r.text();
            var m = html.match(/index-([A-Za-z0-9_-]+)\.js/);
            if (!m) return;
            var liveHash = m[1];
            var curHash = getCurrentBundleHash();
            if (curHash && liveHash && curHash !== liveHash) {
              if (immediate && sessionStorage.getItem(RELOAD_FLAG)) return; // reload loop koruması
              if (immediate) sessionStorage.setItem(RELOAD_FLAG, '1');
              console.log('[stale-bundle] ' + curHash + ' → ' + liveHash + ' reload');
              // Cache bust query string ile reload
              var url = location.pathname + '?v=' + liveHash + location.hash;
              location.replace(url);
            }
          } catch (e) {}
        }
        // 1. ANINDA kontrol (script type="module" yüklenmeden önce)
        checkStale(true);
        // 2. Periyodik kontrol
        setInterval(function() { checkStale(false); }, 180000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
