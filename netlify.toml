[build]
  command = "npm run build"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Hashed bundle dosyaları → bir yıl immutable (içerik hash'ten geliyor, asla değişmez)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Logo/static asset'ler → 1 saat
[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# TÜM diğer route'lar (SPA rewrite ile index.html dönenler dahil) — ASLA cache'lenmesin
# Bu /takvim, /admin, /, /index.html vs hepsini kapsar
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
